<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventHub 관리자 — 후보 승인</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Pretendard", sans-serif; background: #f5f5f7; margin: 0; padding: 20px; color: #1a1a1a; }
  h1 { font-size: 20px; }
  .key-bar { display: flex; gap: 8px; margin-bottom: 20px; }
  .key-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
  .key-bar button { padding: 10px 16px; border-radius: 8px; background: #1a1a1a; color: #fff; border: none; }
  .candidate-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 14px; border: 1px solid #eee; }
  .candidate-card h3 { margin: 0 0 4px; font-size: 15px; }
  .meta { font-size: 12.5px; color: #666; margin-bottom: 8px; line-height: 1.6; }
  .meta a { color: #FF6F00; }
  .note { background: #FFF6E0; border: 1px solid #FCE3A0; border-radius: 6px; padding: 8px 10px; font-size: 12px; color: #9A6B00; margin-bottom: 10px; }
  .approve-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .approve-form input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; grid-column: 1 / -1; }
  .btn-approve { flex: 1; padding: 10px; background: #1E8A4C; color: #fff; border: none; border-radius: 8px; font-weight: 700; }
  .btn-reject { flex: 1; padding: 10px; background: #f1f1f1; color: #333; border: none; border-radius: 8px; font-weight: 700; }
  .empty { text-align: center; color: #999; padding: 40px 0; }
</style>
</head>
<body>

<h1>🗂 EventHub 관리자 — 실제 이벤트 후보 승인</h1>
<p style="font-size:13px;color:#666;">AI가 웹 검색으로 찾은 후보입니다. <b>출처 링크를 반드시 열어서 직접 확인</b>한 뒤 승인해주세요.</p>

<div class="key-bar">
  <input type="password" id="adminKey" placeholder="관리자 키(ADMIN_SECRET)를 입력하세요">
  <button onclick="loadCandidates()">불러오기</button>
</div>

<div id="list"></div>

<script>
async function loadCandidates() {
  const key = document.getElementById("adminKey").value.trim();
  if (!key) { alert("관리자 키를 입력해주세요."); return; }
  localStorage.setItem("eventhub-admin-key", key);

  const res = await fetch(`/api/admin_candidates?key=${encodeURIComponent(key)}`);
  const data = await res.json();
  const listEl = document.getElementById("list");

  if (!res.ok) {
    listEl.innerHTML = `<p class="empty">인증 실패: ${data.error || "알 수 없는 오류"}</p>`;
    return;
  }
  if (!data.length) {
    listEl.innerHTML = `<p class="empty">승인 대기 중인 후보가 없어요.</p>`;
    return;
  }

  listEl.innerHTML = data.map(c => `
    <div class="candidate-card" data-id="${c.id}">
      <h3>[${c.category}] ${c.brand} — ${c.title}</h3>
      <div class="meta">
        혜택: ${c.discount || "정보 없음"} · 기간: ${c.period || "정보 없음"}<br>
        이용방법: ${c.channel || "정보 없음"}<br>
        출처: <a href="${c.source_url}" target="_blank" rel="noopener noreferrer">${c.source_url}</a>
      </div>
      ${c.ai_confidence_note ? `<div class="note">⚠️ AI 메모: ${c.ai_confidence_note}</div>` : ""}
      <p style="font-size:13px;">${c.desc || ""}</p>

      <div class="approve-form">
        <input type="number" step="0.00001" placeholder="위도(lat)" class="f-lat">
        <input type="number" step="0.00001" placeholder="경도(lng)" class="f-lng">
        <input type="text" placeholder="이미지 URL (picsum 등)" class="f-image" style="grid-column: 1 / -1;">
        <input type="text" placeholder="도메인 (예: oliveyoung.co.kr)" class="f-domain">
        <input type="text" placeholder="링크 (비우면 출처 URL 사용)" class="f-link">
        <div class="btn-row">
          <button class="btn-approve" onclick="approve('${c.id}')">✓ 승인하고 게시</button>
          <button class="btn-reject" onclick="reject('${c.id}')">✕ 반려</button>
        </div>
      </div>
    </div>
  `).join("");
}

async function approve(id) {
  const card = document.querySelector(`.candidate-card[data-id="${id}"]`);
  const lat = card.querySelector(".f-lat").value;
  const lng = card.querySelector(".f-lng").value;
  if (!lat || !lng) { alert("위도/경도를 입력해주세요 (지도에서 대략적인 위치를 찾아 입력하시면 됩니다)."); return; }

  const key = localStorage.getItem("eventhub-admin-key");
  const res = await fetch("/api/admin_candidates", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      key, action: "approve", candidateId: id,
      lat: parseFloat(lat), lng: parseFloat(lng),
      image: card.querySelector(".f-image").value,
      domain: card.querySelector(".f-domain").value,
      link: card.querySelector(".f-link").value,
    }),
  });
  const data = await res.json();
  if (!res.ok) { alert("실패: " + (data.error || "")); return; }
  alert("승인 완료! 사이트에 반영됐어요.");
  loadCandidates();
}

async function reject(id) {
  const key = localStorage.getItem("eventhub-admin-key");
  await fetch("/api/admin_candidates", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ key, action: "reject", candidateId: id }),
  });
  loadCandidates();
}

// 저장된 키가 있으면 자동으로 채워넣기
const savedKey = localStorage.getItem("eventhub-admin-key");
if (savedKey) document.getElementById("adminKey").value = savedKey;
</script>

</body>
</html>
